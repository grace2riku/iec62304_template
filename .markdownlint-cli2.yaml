config:
  default: true
  # Line length: disabled for long Japanese sentences / tables
  MD013: false
  # Allow HTML for admonitions when rarely needed
  MD033: false
  # Allow duplicate headings in different sections (e.g., each clause has "改訂履歴")
  MD024:
    siblings_only: true
  # Allow bare URLs (we use few)
  MD034: false
  # Allow trailing punctuation in headings (Japanese punctuation)
  MD026: false
  # First line heading rule off — our files start with frontmatter-like ID block
  MD041: false
  # Fenced code block language — not every code block specifies one
  MD040: false
globs:
  - "**/*.md"
ignores:
  - ".git/**"
  - "node_modules/**"
